name: Validate Skill

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation deps
        run: python -m pip install --upgrade pip pyyaml

      - name: Run validator
        run: python scripts/quick_validate.py arknights-skill

      - name: Check SKILL.md length
        run: |
          lines=$(wc -l < arknights-skill/SKILL.md)
          test "$lines" -le 500
