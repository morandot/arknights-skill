name: Validate Skill

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation deps
        run: python -m pip install --upgrade pip pyyaml pytest ruff

      - name: Check shell scripts
        run: |
          bash -n install.sh
          bash -n update.sh
          bash -n scripts/bump_version.sh

      - name: Run validator
        run: python scripts/quick_validate.py arknights-skill

      - name: Check SKILL.md length
        run: |
          lines=$(wc -l < arknights-skill/SKILL.md)
          test "$lines" -le 500

      - name: Lint with ruff
        run: ruff check arknights-skill/scripts/memory.py scripts/quick_validate.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Check required files exist
        run: |
          for f in \
            arknights-skill/references/answer-templates.md \
            arknights-skill/references/examples.md \
            arknights-skill/agents/openai.yaml \
            arknights-skill/scripts/memory.py \
            arknights-skill/SKILL.md; do
            if [ ! -f "$f" ]; then
              echo "Required file missing: $f" >&2
              exit 1
            fi
          done
          echo "All required files present."
